# fly.toml app configuration file for fly.io
# See https://fly.io/docs/reference/configuration/

app = 'trevecca-pedia-auth'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8083
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

# Environment variables (non-sensitive)
[env]
  PORT = "8083"
  JWT_EXP_HOURS = "24"
  DEV_SEED = "false"

# Secrets to be set via `fly secrets set`:
# - JWT_SECRET (must match api-layer JWT_SECRET)
# - CORS_ORIGINS (optional)
#
# DATABASE_URL is automatically set when attaching Fly Postgres:
#   fly postgres attach --app trevecca-pedia-auth --postgres-app trevecca-pedia-db
