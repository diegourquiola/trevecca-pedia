services:
  auth-db:
    image: postgres:16-alpine
    container_name: trevecca-auth-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${AUTH_DB_USER:-auth_user}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:?AUTH_DB_PASSWORD is required}
      POSTGRES_DB: ${AUTH_DB_NAME:-auth}
    volumes:
      - auth-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-auth_user} -d ${AUTH_DB_NAME:-auth}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  auth-data:
